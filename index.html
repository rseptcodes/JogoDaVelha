<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="jogoDaVelha.css">
    <script type="module" src="js/main.js"></script>

</head>
<body>

    <div class="container">
        <h1>Jogo da Velha</h1>
        <p class="subtitle">Impossível vencer!</p>

        <div class="placar">
            <div>Player: <span id="score-player">0</span></div>
            <div>Tie: <span id="score-ties">0</span></div>
            <div>CPU: <span id="score-cpu">0</span></div>
        </div>

        <div id="status"></div>

        <div id="board"></div>

        <div class="controls">
            <button class ="controls-btn fas fa-arrow-rotate-left" id="resetBtn"></button>
            <i id="difficultyIcon" class="controls-icn"></i>
            <button class ="controls-btn fas fa-gear" id="configBtn"></button>
        </div>
        <div id="settings-overlay" class="settings-overlay hidden">
  <div class="settings-panel">
    <h2 class="settings-title">Configurações</h2>

    <div class="settings-section">
      <h3 class="section-title">Tema</h3>
      <div class="options-group" id="theme-group">
        <input type="radio" id="theme-light" name="theme" value="light" class="sr-only">
        <label for="theme-light" class="option-card theme-card">Claro</label>

        <input type="radio" id="theme-dark" name="theme" value="dark" class="sr-only" checked>
        <label for="theme-dark" class="option-card theme-card">Escuro</label>

        <input type="radio" id="theme-amoled" name="theme" value="amoled" class="sr-only">
        <label for="theme-amoled" class="option-card theme-card">AMOLED</label>
      </div>
    </div>

    <div class="settings-section">
      <h3 class="section-title">Nível da IA</h3>
      <div class="options-group" id="difficulty-group">
        <input type="radio" id="diff-easy" name="difficulty" value="0" class="sr-only">
        <label for="diff-easy" class="option-card diff-card">
          <span class="card-title">Fácil</span>
          <span class="card-subtitle">Aleatório</span>
        </label>

        <input type="radio" id="diff-medium" name="difficulty" value="1" class="sr-only" checked>
        <label for="diff-medium" class="option-card diff-card">
          <span class="card-title">Médio</span>
          <span class="card-subtitle">Padrões</span>
        </label>

        <input type="radio" id="diff-impossible" name="difficulty" value="2" class="sr-only">
        <label for="diff-impossible" class="option-card diff-card">
          <span class="card-title">Impossível</span>
          <span class="card-subtitle">Minimax</span>
        </label>
      </div>
    </div>

    <button id="close-settings" class="controls-btn">Fechar</button>
  </div>
</div>

    </div>
</body>
</html>
