<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="jogoDaVelha.css">
</head>
<body>

    <div class="container">
        <h1>Jogo da Velha</h1>
        <p class="subtitle">Impossível vencer!</p>

        <div class="placar">
            <div>Player: <span id="score-player">0</span></div>
            <div>Tie: <span id="score-ties">0</span></div>
            <div>CPU: <span id="score-cpu">0</span></div>
        </div>

        <div id="status"></div>

        <div id="board"></div>

        <div class="controls">
            <button class ="reset-btn" id="resetBtn">RESET</button>
            <button class ="reset-btn" id="configBtn">CONFIG</button>
        </div>
    </div>

    <script src="jogoDaVelha.js"></script>
</body>
</html>
